<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Bintulu 超市优惠监控</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        .market-section { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .market-title { font-size: 24px; color: #d32f2f; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; }
        .deal-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; transition: transform 0.2s; }
        .deal-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .deal-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: #222; }
        .deal-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 6px; margin-bottom: 10px; background: #eee; }
        .deal-link { display: inline-block; color: #1976d2; text-decoration: none; font-weight: bold; margin-top: 5px; }
        .deal-link:hover { text-decoration: underline; }
        .btn-push { display: block; width: 200px; margin: 30px auto; padding: 12px; background: #333; color: white; text-align: center; border-radius: 8px; cursor: pointer; border: none; font-size: 16px; }
        .btn-push:hover { background: #555; }
        .no-deals { color: #888; font-style: italic; }
    </style>
</head>
<body>

<h1>Bintulu 超级市场优惠汇总</h1>

<!-- ⭐️ 按超市分组展示 -->
{% set grouped = deals | groupby('market') %}

{% for market, items in grouped %}
<div class="market-section">
    <div class="market-title">{{ market }}</div>
    
    {% if items %}
        {% for d in items %}
        <div class="deal-card">
            <div class="deal-title">{{ d.title }}</div>
            
            {% if d.image %}
                <img src="{{ d.image }}" alt="{{ d.title }}" class="deal-image">
            {% endif %}
            
            <a href="{{ d.link }}" target="_blank" class="deal-link">
                👉 查看原帖详情
            </a>
        </div>
        {% endfor %}
    {% else %}
        <p class="no-deals">暂无最新优惠</p>
    {% endif %}
</div>
{% endfor %}

<hr>
<button onclick="enablePush()" class="btn-push">🔔 开启优惠通知</button>

<script>
async function enablePush(){
    if (!("Notification" in window)) { alert("浏览器不支持通知"); return; }
    const permission = await Notification.requestPermission();
    if(permission !== "granted"){ alert("未允许通知"); return; }
    
    // 注册 Service Worker
    navigator.serviceWorker.register("/static/sw.js").then(() => {
        const reg = navigator.serviceWorker.ready.then(reg => {
            return reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: "YOUR_VAPID_PUBLIC_KEY" 
            });
        });
        const sub = await reg;
        
        fetch("/subscribe", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(sub)
        }).then(() => alert("✅ 通知已开启"));
    }).catch(err => console.error(err));
}
</script>

</body>
</html>
