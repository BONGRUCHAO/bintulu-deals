name: scrape

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install
      run: pip install requests beautifulsoup4

    - name: Run scraper
      run: python scraper.py

    - name: Commit results
      run: |
        git config --global user.name "bot"
        git config --global user.email "bot@github.com"
        git add data.json
        git commit -m "update deals" || echo "no changes"
        git push
