name: scrape

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - run: pip install -r requirements.txt

    - run: python scraper.py

    - name: Commit update
      run: |
        git config user.name bot
        git config user.email bot@bot.com
        git add data.json
        git commit -m "update deals" || echo "no changes"
        git push
