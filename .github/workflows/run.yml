name: scrape

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Debug list files
        run: |
          echo "===== 当前目录 ====="
          pwd
          echo "===== 文件列表 ====="
          ls -la

      - name: Commit update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ⭐️ 关键修改：检查文件是否存在，存在才 add
          if [ -f data.json ]; then
            git add data.json
            if git diff --quiet; then
              echo "No changes to commit"
            else
              git commit -m "Auto update deals [skip ci]"
              git push
            fi
          else
            echo "data.json was not created this time, skipping commit."
          fi
